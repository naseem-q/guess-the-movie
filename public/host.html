<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guess The... — TV Display</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Space+Mono:wght@700&family=Noto+Naskh+Arabic:wght@400;600;700&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#08081a;--gold:#FFE66D;--orange:#FB923C;--green:#34D399;--red:#FF6B6B;--blue:#60A5FA;--text:#E8E8F0;--text2:rgba(232,232,240,0.45)}
html,body{height:100%;overflow:hidden}
body{font-family:'Outfit',sans-serif;background:radial-gradient(ellipse at 30% 50%,#12122e 0%,var(--bg) 70%);color:var(--text)}
.screen{display:none;width:100vw;height:100vh;position:relative}.screen.active{display:flex}
.connect-screen{align-items:center;justify-content:center;flex-direction:column;gap:24px}
.connect-screen .icon{font-size:64px;animation:float 3s ease-in-out infinite}
.connect-screen h1{font-family:'Space Mono',monospace;font-size:36px;color:var(--gold)}
.connect-screen p{color:var(--text2);font-size:16px}
.connect-input{padding:16px 24px;border-radius:14px;border:2px solid rgba(255,230,109,0.3);background:rgba(255,255,255,0.05);color:var(--gold);font-size:48px;font-family:'Space Mono',monospace;text-align:center;letter-spacing:14px;outline:none;width:280px;text-transform:uppercase}
.connect-input:focus{border-color:var(--gold)}
.connect-btn{padding:14px 40px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--gold),var(--orange));color:var(--bg);font-size:18px;font-weight:800;font-family:'Outfit',sans-serif;cursor:pointer}
#connect-status{color:var(--gold);font-size:16px;text-align:center;margin-top:12px;font-weight:700}
.lobby-screen{flex-direction:column;align-items:center;justify-content:center;gap:30px}
.lobby-code{font-family:'Space Mono',monospace;font-size:96px;font-weight:700;color:var(--gold);letter-spacing:20px;text-shadow:0 0 40px rgba(255,230,109,0.3);animation:glow 2.5s ease-in-out infinite}
.lobby-sub{font-size:18px;color:var(--text2);letter-spacing:4px;text-transform:uppercase}
.lobby-pg{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;max-width:800px}
.lobby-p{padding:14px 24px;border-radius:14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);font-size:20px;font-weight:700;display:flex;align-items:center;gap:10px;animation:popIn 0.4s ease both}
.lobby-p .badge{font-size:11px;padding:3px 8px;border-radius:6px;background:rgba(255,230,109,0.15);color:var(--gold)}
.game-screen{flex-direction:column;height:100vh;overflow:hidden}
.game-header{display:flex;align-items:center;justify-content:space-between;padding:10px 32px;z-index:10;flex-shrink:0}
.round-badge{font-size:14px;font-weight:800;padding:6px 14px;border-radius:24px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1)}
.cat-badge{font-size:13px;font-weight:700;color:var(--gold);letter-spacing:2px;text-transform:uppercase}
.q-text{font-size:14px;text-align:center;padding:4px 32px 8px;color:var(--text2);font-weight:600;z-index:10;position:relative;flex-shrink:0}
.timer-text{font-family:'Space Mono',monospace;font-size:48px;font-weight:700;color:var(--gold);transition:color 0.3s}
.timer-text.urgent{color:var(--red);animation:pulse 0.5s ease infinite}
.tbar-bg{height:4px;background:rgba(255,255,255,0.06);margin:0 32px;border-radius:3px;overflow:hidden;z-index:10;position:relative;flex-shrink:0}
.tbar{height:100%;border-radius:3px;transition:width 1s linear;background:linear-gradient(90deg,var(--gold),var(--orange))}
.tbar.urgent{background:linear-gradient(90deg,var(--red),#FF4444)}
.poster-area{flex:1;display:flex;align-items:center;justify-content:center;padding:8px 20px;position:relative;z-index:5;min-height:0;overflow:hidden}
.poster-area.portrait{flex-direction:row;justify-content:center;gap:0}
.poster-area.landscape-mode{flex-direction:column;gap:8px}
.poster-box{position:relative;border-radius:16px;overflow:hidden;box-shadow:0 10px 80px rgba(0,0,0,0.7);background:#111;max-height:100%}
.poster-box.portrait-img{max-width:320px;width:100%;max-height:calc(100vh - 180px)}
.poster-box.landscape-img{max-width:650px;width:100%;max-height:calc(100vh - 200px)}
#poster-canvas{width:100%;height:100%;display:block;border-radius:16px;object-fit:contain}
.sidebar{position:absolute;right:16px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:5px;z-index:10}
.sb-p{padding:6px 12px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px}
.sb-p .score{margin-left:auto;color:var(--gold);font-size:12px}
.tv-opts{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;padding:0 32px;margin-bottom:4px;z-index:10;position:relative;flex-shrink:0}
.tv-opts.side-opts{flex-direction:column;padding:0;width:220px;min-width:200px;justify-content:center;align-self:center;position:absolute;left:20px;top:50%;transform:translateY(-50%)}
.tv-opt{padding:10px 16px;border-radius:10px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.tv-opt .lt{width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}
.ans-prog{text-align:center;padding:4px;font-size:12px;color:var(--text2);z-index:10;position:relative;flex-shrink:0}
.room-code-badge{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--gold);padding:6px 12px;border-radius:10px;background:rgba(255,230,109,0.08);border:1px solid rgba(255,230,109,0.15);letter-spacing:3px}
.rev-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;background:rgba(8,8,26,0.8);backdrop-filter:blur(10px);animation:fadeIn 0.3s ease}
.rev-card{text-align:center;padding:28px 44px;border-radius:24px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);animation:popIn 0.4s ease;max-width:600px}
.rev-poster{max-width:240px;max-height:350px;border-radius:14px;margin-bottom:14px;box-shadow:0 8px 40px rgba(0,0,0,0.5);object-fit:cover}
.rev-poster.landscape{max-width:440px;max-height:260px}
.rev-title{font-size:30px;font-weight:900;color:var(--gold)}
.rev-year{font-size:16px;color:var(--text2);margin-top:4px}
.rev-info{font-size:14px;color:var(--text2);margin-top:2px;font-style:italic}
.rev-results{margin-top:14px;display:flex;flex-direction:column;gap:4px;min-width:280px}
.rev-row{display:flex;justify-content:space-between;padding:7px 14px;border-radius:8px;background:rgba(255,255,255,0.04);font-size:15px;animation:slideUp 0.3s ease both}
.rev-row .pts{font-weight:800}.rev-row .pts.correct{color:var(--green)}.rev-row .pts.wrong{color:var(--red)}
.ri-screen{flex-direction:column;align-items:center;justify-content:center;gap:12px}
.ri-icon{font-size:80px;animation:popIn 0.5s ease}.ri-label{font-size:20px;color:var(--text2);letter-spacing:4px;text-transform:uppercase}
.ri-name{font-size:44px;font-weight:900;color:var(--gold)}.ri-count{font-size:18px;color:var(--text2)}
.lb-screen{flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:40px}
.lb-title{font-size:28px;font-weight:900;color:var(--gold)}.lb-sub{font-size:16px;color:var(--text2);margin-bottom:12px}
.lb-row{display:flex;align-items:center;width:100%;max-width:500px;padding:14px 20px;border-radius:14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);margin-bottom:6px;animation:slideUp 0.4s ease both}
.lb-row.first{background:rgba(255,230,109,0.08);border-color:rgba(255,230,109,0.2)}
.lb-rk{font-size:24px;width:40px;text-align:center}.lb-nm{flex:1;font-weight:700;font-size:20px;margin-left:12px}.lb-sc{font-weight:800;font-size:24px;color:var(--gold)}
.final-screen{flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:40px}
.f-trophy{font-size:72px;animation:float 2s ease-in-out infinite}.f-winner{font-size:42px;font-weight:900;color:var(--gold)}.f-sub{font-size:18px;color:var(--text2);margin-bottom:16px}
.mute-btn{position:fixed;top:76px;right:16px;z-index:999;width:44px;height:44px;border-radius:50%;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:var(--text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)}.mute-btn.muted{opacity:0.5}
.fs-btn{position:fixed;top:76px;left:16px;z-index:999;width:44px;height:44px;border-radius:50%;border:1px solid rgba(52,211,153,0.3);background:rgba(52,211,153,0.08);color:var(--green);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.fs-btn:hover{background:rgba(52,211,153,0.18)}
.home-btn{position:fixed;top:76px;left:70px;z-index:999;width:44px;height:44px;border-radius:50%;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:var(--text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);text-decoration:none}
.home-btn:hover{background:rgba(255,255,255,0.12)}
.confetti-c{position:fixed;inset:0;pointer-events:none;z-index:999}
.conf{position:absolute;top:-10px;border-radius:2px;animation:confettiFall linear forwards}
.particles{position:fixed;inset:0;pointer-events:none;z-index:0}
.particle{position:absolute;border-radius:50%;background:var(--gold);opacity:0.08;animation:pFloat linear infinite alternate}
.fullscreen-btn{margin-top:12px;padding:12px 28px;border-radius:12px;border:1px solid rgba(52,211,153,0.3);background:rgba(52,211,153,0.08);color:var(--green);font-size:15px;font-weight:700;font-family:'Outfit',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.fullscreen-btn:hover{background:rgba(52,211,153,0.15)}
.tv-footer{position:absolute;bottom:8px;left:0;right:0;text-align:center;font-size:11px;color:rgba(255,255,255,0.15);z-index:5}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes glow{0%,100%{text-shadow:0 0 40px rgba(255,230,109,0.3)}50%{text-shadow:0 0 80px rgba(255,230,109,0.6)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{from{opacity:0;transform:scale(0.8)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes pFloat{0%{transform:translate(0,0)}100%{transform:translate(40px,-50px)}}
</style>
</head>
<body>
<div class="particles" id="pbg"></div>
<button class="mute-btn" id="mute-btn" onclick="GameAudio.toggleMute();this.textContent=GameAudio.isMuted()?'🔇':'🔊';this.classList.toggle('muted',GameAudio.isMuted())">🔊</button>
<button class="fs-btn" id="fs-btn" onclick="toggleFS()">⛶</button>
<a href="/" class="home-btn" title="Back to Home">🏠</a>

<div id="s-connect" class="screen active connect-screen">
  <div class="icon">📺</div><h1>TV DISPLAY</h1><p>Enter the room code from the game master's phone</p>
  <input type="tel" id="connect-code" class="connect-input" maxlength="6" inputmode="numeric" pattern="[0-9]*" placeholder="123456">
  <button class="connect-btn" onclick="connectHost()">CONNECT</button>
  <div id="connect-status"></div>
</div>

<div id="s-lobby" class="screen lobby-screen">
  <div class="lobby-sub">JOIN WITH CODE</div>
  <div class="lobby-code" id="lobby-code">------</div>
  <div id="lobby-qr-tv" style="margin:12px auto;width:160px;height:160px;background:white;border-radius:10px;padding:6px"></div>
  <div class="lobby-sub" id="lobby-cat"></div>
  <div class="lobby-pg" id="lobby-pg"></div>
  <div class="lobby-sub" style="margin-top:10px">Waiting for host to start...</div>
</div>

<div id="s-ri" class="screen ri-screen">
  <div class="ri-icon" id="ri-icon">🎬</div>
  <div class="ri-label" id="ri-label">ROUND 1 OF 5</div>
  <div class="ri-name" id="ri-name">Movie Posters</div>
  <div class="ri-count" id="ri-count">10 Questions</div>
</div>

<div id="s-game" class="screen game-screen">
  <div class="game-header">
    <div class="round-badge" id="g-round">R1/5</div>
    <div class="cat-badge" id="g-cat">Movie Posters</div>
    <div style="display:flex;align-items:center;gap:16px">
      <div class="room-code-badge" id="g-room-code">JOIN: ----</div>
      <div class="timer-text" id="g-timer">45</div>
    </div>
  </div>
  <div class="tbar-bg"><div class="tbar" id="g-tbar" style="width:100%"></div></div>
  <div class="q-text" id="g-q"></div>
  <div class="poster-area" id="poster-area">
    <div class="tv-opts side-opts" id="tv-opts-left" style="display:none"></div>
    <div class="poster-box" id="poster-box"><canvas id="poster-canvas"></canvas><img id="map-shape-img" style="display:none;width:100%;height:100%;object-fit:contain;filter:invert(1) sepia(1) saturate(5) hue-rotate(10deg) brightness(1.1);padding:40px" crossorigin="anonymous"><div id="actors-display" style="display:none;width:100%;height:100%;flex-direction:row;align-items:center;justify-content:center;gap:20px;padding:20px;background:#1a1a2e"></div><div id="quote-display" style="display:none;width:100%;height:100%;flex-direction:column;align-items:center;justify-content:center;padding:40px;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);border-radius:16px;text-align:center"></div><div id="clues-display" style="display:none;width:100%;height:100%;flex-wrap:wrap;align-items:center;justify-content:center;gap:12px;padding:16px;background:#1a1a2e"></div></div>
    <div class="sidebar" id="sidebar"></div>
  </div>
  <div class="tv-opts" id="tv-opts-bottom" style="display:none"></div>
  <div class="ans-prog" id="ans-prog"></div>
  <div id="rev-overlay" class="rev-overlay" style="display:none"></div>
</div>

<div id="s-lb" class="screen lb-screen">
  <div class="lb-title" id="lb-title">🏆 Leaderboard</div>
  <div class="lb-sub" id="lb-sub"></div>
  <div id="lb-rows"></div>
</div>

<div id="s-final" class="screen final-screen">
  <div class="f-trophy">🏆</div>
  <div class="f-winner" id="f-winner">Winner!</div>
  <div class="f-sub" id="f-sub">Final Scores</div>
  <div id="f-rows" style="width:100%;max-width:500px"></div>
</div>

<div class="confetti-c" id="confetti"></div>
<div class="tv-footer">Powered by Naseem Q. All rights reserved &copy; <span id="yr"></span></div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="/audio.js"></script>
<script>
(function(){
  document.getElementById('yr').textContent=new Date().getFullYear();

  // ═══ FULLSCREEN TOGGLE ══════════════════════════════
  window.toggleFS=function(){
    const el=document.documentElement;
    const btn=document.getElementById('fs-btn');
    if(!document.fullscreenElement&&!document.webkitFullscreenElement&&!document.msFullscreenElement){
      if(el.requestFullscreen) el.requestFullscreen();
      else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if(el.msRequestFullscreen) el.msRequestFullscreen();
      btn.textContent='✕';
    }else{
      if(document.exitFullscreen) document.exitFullscreen();
      else if(document.webkitExitFullscreen) document.webkitExitFullscreen();
      else if(document.msExitFullscreen) document.msExitFullscreen();
      btn.textContent='⛶';
    }
  };
  document.addEventListener('fullscreenchange',()=>{document.getElementById('fs-btn').textContent=document.fullscreenElement?'✕':'⛶'});
  document.addEventListener('webkitfullscreenchange',()=>{document.getElementById('fs-btn').textContent=document.webkitFullscreenElement?'✕':'⛶'});

  const pbg=document.getElementById('pbg');for(let i=0;i<20;i++){const p=document.createElement('div');p.className='particle';const s=2+Math.random()*4;p.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${s}px;height:${s}px;animation-duration:${15+Math.random()*25}s;animation-delay:${Math.random()*10}s;`;pbg.appendChild(p)}

  let socket=null,roomCode='',timerInt=null,timerDur=50,timerStart=0;
  let diff={},animFrame=null,cPos={x:50,y:50},cVel={x:0.4,y:0.3};
  let playerList=[],curImg=null,curType='',curNoBlur=false,curLightBg=false;
  const canvas=document.getElementById('poster-canvas'),ctx=canvas.getContext('2d');
  let revActive=false;

  // Fill canvas black initially
  function fillBlack(){ctx.fillStyle='#111';ctx.fillRect(0,0,canvas.width||100,canvas.height||100)}
  fillBlack();

  function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}

  function drawReveal(img,progress,cp){
    const w=canvas.width,h=canvas.height;
    ctx.clearRect(0,0,w,h);

    // If noBlur, draw image fully clear
    if(curNoBlur){
      if(curLightBg){
        // Map silhouette: white background, then draw image, then colorize
        ctx.fillStyle='#f0f0f0';ctx.fillRect(0,0,w,h);
        ctx.drawImage(img,0,0,w,h);
        // Colorize: overlay gold tint on the black silhouette
        ctx.globalCompositeOperation='source-atop';
        ctx.fillStyle='#FFE66D';ctx.fillRect(0,0,w,h);
        ctx.globalCompositeOperation='destination-over';
        ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,w,h);
        ctx.globalCompositeOperation='source-over';
      } else {
        ctx.drawImage(img,0,0,w,h);
      }
      return;
    }

    // Calculate current blur
    const maxBlur=diff.startBlur||42;
    const blur=Math.max(0.5,maxBlur*(1-Math.pow(progress,diff.blurDecayPower||1.7)));

    // 1. Draw blurred background
    ctx.save();
    ctx.filter=`blur(${blur}px)`;
    ctx.drawImage(img,-blur,-blur,w+blur*2,h+blur*2);
    ctx.filter='none';
    ctx.restore();

    // 2. Draw clear circle on top
    const radius=Math.max(6,(diff.startRadius+((52-(diff.startRadius||5))*progress))*Math.min(w,h)/100);
    const cx=cp.x*w/100, cy=cp.y*h/100;
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx,cy,radius,0,Math.PI*2);
    ctx.clip();
    ctx.drawImage(img,0,0,w,h);
    ctx.restore();

    // 3. Golden glow ring
    ctx.beginPath();
    ctx.arc(cx,cy,radius,0,Math.PI*2);
    ctx.strokeStyle=`rgba(255,230,109,${0.3+0.2*Math.sin(Date.now()/400)})`;
    ctx.lineWidth=2.5;
    ctx.stroke();
  }

  function animRev(){
    if(!revActive||!curImg)return;
    const pr=Math.min((Date.now()-timerStart)/1000/timerDur,1);
    cVel.x+=(Math.random()-0.5)*0.12;cVel.y+=(Math.random()-0.5)*0.12;
    cVel.x=Math.max(-1.2,Math.min(1.2,cVel.x));cVel.y=Math.max(-1.2,Math.min(1.2,cVel.y));
    cPos.x+=cVel.x;cPos.y+=cVel.y;
    if(cPos.x<15){cPos.x=15;cVel.x*=-0.7}if(cPos.x>85){cPos.x=85;cVel.x*=-0.7}
    if(cPos.y<15){cPos.y=15;cVel.y*=-0.7}if(cPos.y>85){cPos.y=85;cVel.y*=-0.7}
    drawReveal(curImg,pr,cPos);animFrame=requestAnimationFrame(animRev);
  }
  function startAnim(){revActive=true;cPos={x:25+Math.random()*50,y:25+Math.random()*50};cVel={x:(Math.random()-0.5)*0.8,y:(Math.random()-0.5)*0.8};animRev()}
  function stopAnim(){revActive=false;cancelAnimationFrame(animFrame)}
  function drawFull(img){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.filter='none';ctx.drawImage(img,0,0,canvas.width,canvas.height)}

  window.connectHost=function(){
    const code=document.getElementById('connect-code').value.trim().toUpperCase();
    if(!code||code.length!==6)return alert('Enter 6-digit room code');
    document.getElementById('connect-status').textContent='Connecting...';roomCode=code;
    socket=io({reconnection:true,timeout:10000});
    socket.on('connect',()=>{
      document.getElementById('connect-status').textContent='Joining room...';
      socket.emit('host-connect',{code:roomCode},(res)=>{
        if(!res||res.error){document.getElementById('connect-status').textContent=res?.error||'Error';return}
        document.getElementById('lobby-code').textContent=roomCode;
        document.getElementById('lobby-cat').textContent=res.categoryName||'';
        renderLobby(res.players);playerList=res.players;show('s-lobby');
        // Generate QR code on TV lobby
        setTimeout(()=>{const qc=document.getElementById('lobby-qr-tv');if(qc){qc.innerHTML='';try{new QRCode(qc,{text:`${location.origin}/?code=${roomCode}`,width:148,height:148,colorDark:'#0a0a1a',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M})}catch(e){}}},300);
      });
    });
    socket.on('connect_error',()=>{document.getElementById('connect-status').textContent='Failed...'});
    socket.on('player-list-update',(p)=>{playerList=p;renderLobby(p);renderSB(p)});

    socket.on('round-intro',(d)=>{show('s-ri');document.getElementById('ri-icon').textContent=d.roundIcon;const isAr=d.roundType?.startsWith('ar_');document.getElementById('ri-label').textContent=isAr?`الجولة ${d.roundNumber} من ${d.totalRounds}`:`ROUND ${d.roundNumber} OF ${d.totalRounds}`;document.getElementById('ri-name').textContent=d.roundLabel;document.getElementById('ri-name').style.direction=isAr?'rtl':'ltr';document.getElementById('ri-count').textContent=isAr?`${d.questionsCount} أسئلة`:`${d.questionsCount} Questions`;GameAudio.roundStart();GameAudio.startMusic(d.musicTrack||0)});

    socket.on('question-start',(d)=>{
      show('s-game');document.getElementById('rev-overlay').style.display='none';
      document.getElementById('g-round').textContent=`R${d.roundNumber}/${d.totalRounds} • Q${d.questionNumber}/${d.totalQuestions}`;
      document.getElementById('g-cat').textContent=d.category;
      document.getElementById('g-room-code').textContent='JOIN: '+roomCode;

      // Question text — larger + rotating hints + RTL for Arabic
      const qEl=document.getElementById('g-q');
      const hints=d.hints||[];
      const isArabic=d.type?.startsWith('ar_');
      const dir=isArabic?'rtl':'ltr';
      qEl.style.direction=dir;
      qEl.innerHTML=`<div style="font-size:22px;font-weight:800;color:var(--text);margin-bottom:6px;direction:${dir}">${d.question||''}</div>${hints.length?'<div id="g-hint" style="font-size:14px;color:var(--gold);font-style:italic;opacity:0.6;transition:opacity 0.4s;min-height:20px;direction:${dir}">'+hints[0]+'</div>':''}`;

      // Rotate hints every 3 seconds
      if(window._hintTimer) clearInterval(window._hintTimer);
      if(hints.length>1){
        let hIdx=0;
        window._hintTimer=setInterval(()=>{
          hIdx=(hIdx+1)%hints.length;
          const hEl=document.getElementById('g-hint');
          if(hEl){hEl.style.opacity='0';setTimeout(()=>{hEl.textContent=hints[hIdx];hEl.style.opacity='0.6'},400)}
        },3000);
      }

      // Determine layout
      const isL=d.landscape||d.type==='movie_scene'||d.type==='tv_scene'||d.type?.startsWith('flag_');
      diff=d.difficulty||{startBlur:42,startRadius:5,blurDecayPower:1.7};

      // noBlur: show image fully clear (for capitals, landmarks, map shapes)
      curNoBlur=d.noBlur||false;
      curLightBg=d.lightBg||false;
      if(curNoBlur){
        diff={...diff,startBlur:0,startRadius:100,blurDecayPower:0.1};
      }
      // Darker blur for flags
      else if(d.type?.startsWith('flag_')){
        diff={...diff,startBlur:Math.max(diff.startBlur,50),blurDecayPower:Math.max(diff.blurDecayPower||1.7,2.0)};
      }

      timerDur=d.timer;timerStart=Date.now();curType=d.type;

      const box=document.getElementById('poster-box');
      box.className='poster-box '+(isL?'landscape-img':'portrait-img');
      if(d.lightBg) box.style.background='#1a1a2e';
      else box.style.background='#111';
      const area=document.getElementById('poster-area');
      area.className='poster-area '+(isL?'landscape-mode':'portrait');

      const optsLeft=document.getElementById('tv-opts-left');
      const optsBottom=document.getElementById('tv-opts-bottom');
      optsLeft.innerHTML='';optsBottom.innerHTML='';

      // Build option elements
      const optEls=[];
      ['A','B','C','D'].forEach((l,i)=>{if(d.options[i]){const e=document.createElement('div');e.className='tv-opt';e.style.direction=isArabic?'rtl':'ltr';e.innerHTML=`<span class="lt">${l}</span><span>${d.options[i]}</span>`;optEls.push(e)}});

      if(isL){
        // Landscape: options below poster
        optsLeft.style.display='none';
        optsBottom.style.display='flex';
        optEls.forEach(e=>optsBottom.appendChild(e));
      }else{
        // Portrait: options on left side
        optsLeft.style.display='flex';
        optsBottom.style.display='none';
        optEls.forEach(e=>optsLeft.appendChild(e));
      }

      const mapImg=document.getElementById('map-shape-img');
      const actorsDiv=document.getElementById('actors-display');
      const quoteDiv=document.getElementById('quote-display');
      const cluesDiv=document.getElementById('clues-display');

      // Helper to hide all special displays
      function hideAllSpecial(){canvas.style.display='none';mapImg.style.display='none';actorsDiv.style.display='none';quoteDiv.style.display='none';cluesDiv.style.display='none'}

      // Quote round: show quote text in styled box
      if(d.noImage && d.quoteText){
        hideAllSpecial();
        quoteDiv.style.display='flex';
        box.style.background='linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%)';
        const isAr=d.isArabicQuote;
        const dir=isAr?'rtl':'ltr';
        const fontFamily=isAr?"'Tajawal','Noto Naskh Arabic',serif":"Georgia,'Times New Roman',serif";
        quoteDiv.innerHTML=`
          <div style="font-size:70px;opacity:0.2;color:#FFE66D;margin-bottom:8px">\u275D</div>
          <div style="font-size:${isAr?'30':'28'}px;font-weight:700;color:#FFE66D;line-height:1.8;direction:${dir};font-family:${fontFamily};max-width:88%;text-align:center;text-shadow:0 2px 10px rgba(0,0,0,0.3)">${d.quoteText}</div>
          ${d.quoteTranslation?`<div style="font-size:16px;color:rgba(255,255,255,0.55);margin-top:14px;font-style:italic;max-width:80%;text-align:center;line-height:1.5;direction:${isAr?'ltr':'rtl'};font-family:${isAr?"Georgia,serif":"'Tajawal',serif"}">${d.quoteTranslation}</div>`:''}
          <div style="font-size:70px;opacity:0.2;color:#FFE66D;margin-top:8px">\u275E</div>
        `;
        curImg=null;curNoBlur=true;curLightBg=false;
        revActive=true;animFrame=requestAnimationFrame(function tick(){if(!revActive)return;animFrame=requestAnimationFrame(tick)});
      }
      // Connection round: show 4 clue images in 2x2 grid
      else if(d.clueImages && d.clueImages.length >= 4){
        hideAllSpecial();
        cluesDiv.style.display='flex';
        box.style.background='#1a1a2e';
        cluesDiv.innerHTML='';
        d.clueImages.forEach((src,i)=>{
          const card=document.createElement('div');
          card.style.cssText='width:calc(50% - 8px);aspect-ratio:4/3;position:relative;border-radius:12px;overflow:hidden;box-shadow:0 4px 15px rgba(0,0,0,0.4)';
          if(src){
            card.innerHTML=`<img src="${src}" style="width:100%;height:100%;object-fit:cover" crossorigin="anonymous"><div style="position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.8));padding:8px 12px;font-size:13px;color:var(--gold);font-weight:600">${d.clueHints?.[i]||''}</div>`;
          } else {
            card.innerHTML=`<div style="width:100%;height:100%;background:#2a2a4e;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--gold);padding:10px;text-align:center">${d.clueHints?.[i]||'?'}</div>`;
          }
          cluesDiv.appendChild(card);
        });
        curImg=null;curNoBlur=true;curLightBg=false;
        revActive=true;animFrame=requestAnimationFrame(function tick(){if(!revActive)return;animFrame=requestAnimationFrame(tick)});
      }
      // Shared cast: show 3 actor photos side by side
      else if(d.actorImages && d.actorImages.length >= 3){
        hideAllSpecial();
        actorsDiv.style.display='flex';
        actorsDiv.innerHTML='';
        d.actorImages.forEach((src,i)=>{
          const card=document.createElement('div');
          card.style.cssText='text-align:center;flex:1;max-width:200px';
          card.innerHTML=`<img src="${src}" style="width:100%;max-height:280px;object-fit:cover;border-radius:14px;box-shadow:0 4px 20px rgba(0,0,0,0.5)" crossorigin="anonymous"><div style="margin-top:8px;font-size:15px;font-weight:700;color:var(--gold)">${d.actorNames?.[i]||''}</div>`;
          actorsDiv.appendChild(card);
        });
        box.style.background='#1a1a2e';
        curImg=null;curNoBlur=true;curLightBg=false;
        revActive=true;animFrame=requestAnimationFrame(function tick(){if(!revActive)return;animFrame=requestAnimationFrame(tick)});
      }
      // Map shape: use <img> with CSS filter
      else if(d.lightBg){
        hideAllSpecial();
        mapImg.style.display='block';
        mapImg.src=d.image;
        box.style.background='#1a1a2e';
        curImg=null;curNoBlur=true;
        revActive=true;animFrame=requestAnimationFrame(function tick(){if(!revActive)return;animFrame=requestAnimationFrame(tick)});
      } else {
        hideAllSpecial();
        canvas.style.display='block';
        box.style.background='#111';
        const img=new Image();img.crossOrigin='anonymous';
        canvas.width=isL?960:520;canvas.height=isL?540:780;
        fillBlack();
        curImg=null;
        img.onload=function(){curImg=img;startAnim()};
        img.onerror=function(){console.error('Img fail')};img.src=d.image;
      }
      renderSB(playerList);startTimer();
    });

    socket.on('answer-progress',(d)=>{document.getElementById('ans-prog').textContent=`${d.answered}/${d.total} answered`});

    socket.on('question-reveal',(d)=>{
      clearInterval(timerInt);stopAnim();if(curImg)drawFull(curImg);GameAudio.reveal();
      const ov=document.getElementById('rev-overlay');ov.style.display='flex';
      const isL=curType==='movie_scene'||curType==='tv_scene';
      let rh='';Object.entries(d.results).sort((a,b)=>b[1].points-a[1].points).forEach(([n,r],i)=>{rh+=`<div class="rev-row" style="animation-delay:${i*0.05}s"><span>${n}</span><span class="pts ${r.correct?'correct':'wrong'}">${r.correct?'+'+r.points:'✗'}</span></div>`});
      ov.innerHTML=`<div class="rev-card"><img src="${d.image}" class="rev-poster ${isL?'landscape':''}" crossorigin="anonymous" onerror="this.style.display='none'"><div class="rev-title">${d.answer}</div><div class="rev-year">${d.year||''}</div>${d.info&&d.info!==d.answer?`<div class="rev-info">${d.info}</div>`:''}<div class="rev-results">${rh}</div></div>`;
      if(d.leaderboard){playerList=d.leaderboard;renderSB(playerList)}
    });

    socket.on('round-results',(d)=>{
      stopAnim();GameAudio.roundComplete();
      document.getElementById('lb-title').innerHTML=`🏆 ${d.roundLabel} Complete!`;document.getElementById('lb-sub').textContent=`Round ${d.roundNumber} of ${d.totalRounds}`;
      const rows=document.getElementById('lb-rows');rows.innerHTML='';
      d.leaderboard.forEach((p,i)=>{const e=document.createElement('div');e.className=`lb-row ${i===0?'first':''}`;e.style.animationDelay=`${i*0.08}s`;e.innerHTML=`<span class="lb-rk">${i===0?'👑':i===1?'🥈':i===2?'🥉':'#'+(i+1)}</span><span class="lb-nm">${p.name}</span><span class="lb-sc">${p.score}</span>`;rows.appendChild(e)});
      show('s-lb');playerList=d.leaderboard;
    });

    socket.on('final-results',(d)=>{
      stopAnim();GameAudio.stopMusic();GameAudio.winner();
      const w=d.leaderboard[0];document.getElementById('f-winner').textContent=w?`${w.name} Wins!`:'Game Over!';document.getElementById('f-sub').textContent=w?`${w.score} points`:'';
      const rows=document.getElementById('f-rows');rows.innerHTML='';
      d.leaderboard.forEach((p,i)=>{const e=document.createElement('div');e.className=`lb-row ${i===0?'first':''}`;e.style.animationDelay=`${i*0.1}s`;e.innerHTML=`<span class="lb-rk">${i===0?'🥇':i===1?'🥈':i===2?'🥉':'#'+(i+1)}</span><span class="lb-nm">${p.name}</span><span class="lb-sc">${p.score}</span>`;rows.appendChild(e)});
      show('s-final');spawnConfetti();
    });

    socket.on('game-paused',()=>{clearInterval(timerInt);stopAnim()});
    socket.on('game-resumed',()=>{startAnim();startTimer()});

    // When host clicks Play Again, TV goes back to connect screen
    socket.on('game-reset',()=>{
      stopAnim();GameAudio.stopMusic();clearInterval(timerInt);
      show('s-connect');
      document.getElementById('connect-code').value='';
      document.getElementById('connect-status').textContent='Game ended. Enter a new room code to continue.';
    });

    // When host starts new game in same room, TV goes back to lobby
    socket.on('new-game-ready',(d)=>{
      stopAnim();GameAudio.stopMusic();clearInterval(timerInt);
      document.getElementById('lobby-code').textContent=roomCode;
      document.getElementById('lobby-cat').textContent=d.categoryName||'';
      renderLobby(d.players);playerList=d.players;
      show('s-lobby');
      setTimeout(()=>{const qc=document.getElementById('lobby-qr-tv');if(qc){qc.innerHTML='';try{new QRCode(qc,{text:`${location.origin}/?code=${roomCode}`,width:148,height:148,colorDark:'#0a0a1a',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M})}catch(e){}}},300);
    });
  };

  function startTimer(){clearInterval(timerInt);const tE=document.getElementById('g-timer'),bE=document.getElementById('g-tbar');tE.classList.remove('urgent');bE.classList.remove('urgent');timerInt=setInterval(()=>{const el=(Date.now()-timerStart)/1000,rem=Math.max(0,timerDur-el);tE.textContent=Math.ceil(rem);bE.style.width=(rem/timerDur)*100+'%';if(rem<=5){tE.classList.add('urgent');bE.classList.add('urgent');if(Math.ceil(rem)!==Math.ceil(rem+0.2))GameAudio.tick()}if(rem<=0)clearInterval(timerInt)},200)}
  function renderLobby(p){const g=document.getElementById('lobby-pg');g.innerHTML='';p.forEach((x,i)=>{const e=document.createElement('div');e.className='lobby-p';e.style.animationDelay=`${i*0.08}s`;e.innerHTML=`🎮 ${x.name} ${x.isMaster?'<span class="badge">HOST</span>':''}`;g.appendChild(e)})}
  function renderSB(p){const s=document.getElementById('sidebar');s.innerHTML='';p.forEach(x=>{const e=document.createElement('div');e.className='sb-p';e.innerHTML=`<span>${x.name}</span><span class="score">${x.score}</span>`;s.appendChild(e)})}
  function spawnConfetti(){const c=document.getElementById('confetti');c.innerHTML='';const cols=['#FF6B6B','#4ECDC4','#FFE66D','#A78BFA','#F472B6','#34D399','#FB923C'];for(let i=0;i<60;i++){const p=document.createElement('div');p.className='conf';const s=6+Math.random()*10,d=2+Math.random()*2;p.style.cssText=`left:${Math.random()*100}%;width:${s}px;height:${s*1.5}px;background:${cols[i%cols.length]};animation-duration:${d}s;animation-delay:${Math.random()*0.8}s;transform:rotate(${Math.random()*360}deg)`;c.appendChild(p)}setTimeout(()=>c.innerHTML='',5000)}

  const params=new URLSearchParams(window.location.search);
  if(params.get('code')){document.getElementById('connect-code').value=params.get('code');setTimeout(connectHost,500)}
})();
</script>
</body>
</html>
